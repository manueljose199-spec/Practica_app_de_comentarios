<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento de Libros</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="container">
    <h1>📚 Seguimiento de Libros danos tu opinión</h1>

    <form id="commentForm" class="form">
      <textarea 
        id="commentInput" 
        placeholder="Escribe tu comentario sobre el libro  "
        required
      ></textarea>

      <button type="submit">Agregar comentario</button>
    </form>

    <section id="commentsSection" class="comments">
      <h2>Comentarios</h2>
      <!-- Aquí aparecerán los comentarios -->
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
